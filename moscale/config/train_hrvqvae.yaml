exp:
  root_ckpt_dir: './checkpoint_dir'
  root_log_dir: './log'
  name: hrvqvae
  device: 'cuda:0'
  seed: 10306

data:
  name: 'humanml3d'
  root_dir: '/your/path/dataset/HumanML3D'  # TODO: update to your dataset/HumanML3D path
  dim_pose: 263

quantizer:
  code_dim: 512
  nb_code: 512
  scales: [8, 4, 2, 1]
  quantize_dropout_prob: 0
  share_quant_resi: 4
  quant_resi: 0
  start_drop: -1
  mu: 0.99

model:
  down_t: 2
  stride_t: 2
  width: 512
  depth: 3
  dilation_growth_rate: 3
  vq_act: 'relu'
  use_attn: True
  vq_norm: None

training:
  batch_size: 256
  max_epoch: 1000
  lambda_fk: 0
  lambda_commit: 0.02
  lambda_global: 0
  lambda_expicit: 0.5
  ema: False
  weight_decay: 0.0
  lr: 3.0e-4
  milestones: [300, 700]
  gamma: 0.3
  warm_up_iter: 2000
  log_every: 10
  eval_every_e: 10
  recons_loss: 'l1_smooth'
